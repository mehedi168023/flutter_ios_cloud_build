name: Build iOS IPA

on:
  push:
    branches: [ main ]
    paths: 
      - 'pubspec.yaml'
      - 'ios/**'
      - 'lib/**'
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        flutter-version: '3.13.x'
        
    - name: Enable Xcode license
      run: sudo xcodebuild -license accept
        
    - name: Get Flutter dependencies
      run: flutter pub get
        
    - name: Build iOS app (unsigned)
      run: flutter build ios --release --no-codesign
        
    - name: Create IPA file
      run: |
        cd build/ios/iphoneos/Runner.app
        zip -r ../../../../app.ipa .
        
    - name: Upload IPA artifact
      uses: actions/upload-artifact@v3
      with:
        name: ios-build-ipa
        path: build/app.ipa
        
    - name: Download IPA (optional for testing)
      run: |
        mkdir -p downloads
        cp build/app.ipa downloads/app.ipa
        echo "IPA file available at: downloads/app.ipa"